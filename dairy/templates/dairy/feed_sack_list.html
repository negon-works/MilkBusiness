{% extends 'base.html' %}
{% block title %}Feed Sacks{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl space-y-3">
  <div class="flex items-center justify-between"><h1 class="text-2xl font-bold">Feed Sacks</h1><a href="{% url 'feed_sack_create' %}" class="rounded-full bg-emerald-600 px-4 py-2 text-sm font-semibold text-white">+ Add</a></div>
  {% for item in purchases %}
    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div class="flex items-center justify-between"><div><div class="font-semibold">{{ item.purchase_date }}</div><div class="text-sm text-slate-500">{{ item.notes|default:'No note' }}</div></div><div class="text-xl font-bold">{{ item.sack_count }} sacks</div></div></div>
  {% empty %}<div class="rounded-xl border border-slate-200 bg-white p-4 text-slate-600">No feed sack entries yet.</div>{% endfor %}
</div>
{% endblock %}
