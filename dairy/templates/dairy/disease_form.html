{% extends 'base.html' %}
{% block title %}Add Disease{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
  <h1 class="mb-3 text-2xl font-bold">Add Disease</h1>
  <form method="post" class="space-y-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    {% csrf_token %}
    <div>{{ form.name.label_tag }} {{ form.name }}</div>
    <button class="w-full rounded-lg bg-emerald-600 px-4 py-2 font-semibold text-white">Save Disease</button>
    <a href="{% url 'home' %}" class="block w-full rounded-lg border border-slate-300 px-4 py-2 text-center font-semibold text-slate-700">Cancel</a>
  </form>
</div>
{% endblock %}
